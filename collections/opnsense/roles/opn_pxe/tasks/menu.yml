---
# Generate and deploy custom iPXE boot menu.
# Lists local ISOs with kernel+initrd boot, netboot.xyz as internet fallback.
# Extracts vmlinuz+initrd from ISOs (Ubuntu casper, Fedora images/pxeboot).
# Served by Nginx at http://<gateway>:8080/menu.ipxe
# iPXE fetches this via HTTP after Kea serves the URL in bootfile-name
# when user-class matches "iPXE".

- name: Check if kernel and initrd already extracted
  ansible.builtin.stat:
    path: "{{ opnsense_pxe_root }}/{{ item.dest | dirname }}/vmlinuz"
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars: &ssh_vars
    ansible_connection: ssh
    ansible_user: "root"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_python_interpreter: /usr/local/bin/python3
  loop: "{{ opnsense_pxe_assets | selectattr('dest', 'search', '\\.iso$') | list }}"
  loop_control:
    label: "{{ item.dest | dirname }}/vmlinuz"
  register: opn_pxe_kernel_check
  when: opnsense_pxe_assets | default([]) | length > 0

# FreeBSD mdconfig + cd9660 mount — no Ansible module equivalent.
# Only runs when vmlinuz is missing for a given ISO.
- name: Extract kernel and initrd from ISOs (FreeBSD mdconfig)
  ansible.builtin.raw: |
    ISO="{{ opnsense_pxe_root }}/{{ item.item.dest }}"
    DIR=$(dirname "$ISO")
    UNIT=99
    mdconfig -a -t vnode -f "$ISO" -u $UNIT
    mkdir -p /tmp/iso_extract
    mount -t cd9660 /dev/md${UNIT} /tmp/iso_extract
    if [ -f /tmp/iso_extract/casper/vmlinuz ]; then
      cp /tmp/iso_extract/casper/vmlinuz "$DIR/vmlinuz"
      cp /tmp/iso_extract/casper/initrd "$DIR/initrd"
      echo "EXTRACTED casper"
    elif [ -f /tmp/iso_extract/images/pxeboot/vmlinuz ]; then
      cp /tmp/iso_extract/images/pxeboot/vmlinuz "$DIR/vmlinuz"
      cp /tmp/iso_extract/images/pxeboot/initrd.img "$DIR/initrd"
      echo "EXTRACTED pxeboot"
    else
      echo "NO_KERNEL"
    fi
    umount /tmp/iso_extract
    mdconfig -d -u $UNIT
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "root"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
  loop: "{{ opn_pxe_kernel_check.results | default([]) }}"
  loop_control:
    label: "{{ item.item.dest }}"
  register: opn_pxe_extract_results
  changed_when: "'EXTRACTED' in opn_pxe_extract_results.stdout"
  when:
    - opn_pxe_kernel_check.results is defined
    - not item.stat.exists

- name: Build iPXE menu entries from local assets
  ansible.builtin.set_fact:
    opn_pxe_menu_entries: >-
      {{ opnsense_pxe_assets
         | selectattr('dest', 'search', '\.iso$')
         | rejectattr('dest', 'search', 'netboot\.xyz')
         | list }}

- name: Assert bootable ISO assets were found for menu generation
  ansible.builtin.assert:
    that:
      - opn_pxe_menu_entries | length > 0
    fail_msg: >-
      No bootable ISO assets found in opnsense_pxe_assets after filtering.
      Assets: {{ opnsense_pxe_assets | map(attribute='dest') | list }}.
      Filter matched: {{ opn_pxe_menu_entries | length }} entries.
      Check that asset dest paths end in .iso and are not netboot.xyz.

- name: Generate custom iPXE boot menu
  ansible.builtin.copy:
    content: |
      #!ipxe
      # =========================================================
      # ContainerCraft Network Boot Menu
      # Generated by Ansible opn_pxe role
      # =========================================================
      # Stage 2: iPXE fetches this via HTTP from Nginx
      # Local assets boot from LAN — no internet required
      # netboot.xyz available as internet fallback
      # =========================================================

      set space:hex 20:20
      set space ${space:string}
      set menu_port {{ opnsense_pxe_menu_port }}
      set boot_server http://${next-server}:${menu_port}

      :start
      menu ContainerCraft Network Boot [ ${net0/ip} / ${net0/mac} ]
      item --gap -- Local Installs (LAN — no internet required):
      {% for asset in opn_pxe_menu_entries %}
      {% set label = asset.dest | basename | regex_replace('\\.iso$', '') %}
      item {{ asset.dest | regex_replace('[^a-zA-Z0-9]', '_') }} ${space} {{ label }}
      {% endfor %}
      item --gap --
      item --gap -- Internet:
      item netbootxyz ${space} netboot.xyz (all distros, requires internet)
      item --gap --
      item --gap -- Tools:
      item sanboot_url ${space} SAN boot ISO by URL
      item shell ${space} iPXE shell
      item local ${space} Boot from local disk
      choose --timeout 0 --default local selected || goto local
      goto ${selected}

      {% for asset in opn_pxe_menu_entries %}
      {% set tag = asset.dest | regex_replace('[^a-zA-Z0-9]', '_') %}
      {% set label = asset.dest | basename | regex_replace('\\.iso$', '') %}
      :{{ tag }}
      echo
      echo Booting {{ label }}...
      echo Server: ${boot_server}
      echo
      imgfree
      kernel ${boot_server}/{{ asset.dest | dirname }}/vmlinuz root=/dev/ram0 ramdisk_size=3500000 ip=dhcp url=${boot_server}/{{ asset.dest }} cloud-config-url=/dev/null
      initrd ${boot_server}/{{ asset.dest | dirname }}/initrd
      boot || goto start

      {% endfor %}
      :netbootxyz
      echo Chainloading netboot.xyz...
      echo Trying local copy first, then internet fallback...
      chain --autofree ${boot_server}/assets/netboot.xyz/netboot.xyz.kpxe ||
      chain --autofree http://boot.netboot.xyz/menu.ipxe || goto start

      :sanboot_url
      echo -n Enter full ISO URL (http://...): && read iso_url
      echo Attempting SAN boot from ${iso_url}...
      sanboot ${iso_url} || goto start

      :shell
      echo Type "exit" to return to menu.
      shell
      goto start

      :local
      exit 1
    dest: "{{ opnsense_pxe_root }}/menu.ipxe"
    owner: root
    group: wheel
    mode: "0644"
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars: *ssh_vars

- name: Assert menu.ipxe was deployed
  ansible.builtin.stat:
    path: "{{ opnsense_pxe_root }}/menu.ipxe"
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars: *ssh_vars
  register: opn_pxe_menu_stat
  failed_when: not opn_pxe_menu_stat.stat.exists

- name: Verify menu.ipxe is accessible via HTTP
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ opnsense_pxe_menu_port }}/menu.ipxe"
    return_content: false
    status_code: 200
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars: *ssh_vars
  changed_when: false
  when:
    - opn_pxe_menu_entries | default([]) | length > 0
    - not ansible_check_mode
