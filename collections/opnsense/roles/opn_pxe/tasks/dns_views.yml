---
# Unbound DNS views for per-subnet boot.home.arpa resolution.
# Each PXE-enabled subnet resolves boot.home.arpa to its own gateway IP
# so clients always reach the local Nginx on port 8080.
#
# Upstream Unbound supports view: sections with access-control-view mapping.
# OPNsense does not expose views in the GUI/API but custom includes in
# /usr/local/etc/unbound.opnsense.d/ survive restarts — start.sh copies
# *.conf from there into /var/unbound/etc/ before launching unbound.
#
# view-first: yes ensures all other DNS queries fall through to global
# host overrides in host_entries.conf.

- name: Build Unbound views configuration for PXE subnets
  ansible.builtin.set_fact:
    opn_pxe_dns_views_conf: |
      # Managed by ansible — PXE boot DNS views
      # Each PXE subnet resolves boot.{{ opnsense_domain }} to its local gateway
      {% for zone in opnsense_pxe_subnets %}
      {% if zone in netspec.zones and netspec.zones[zone].subnet is defined %}

      view:
          name: "pxe-{{ zone }}"
          local-data: "boot.{{ opnsense_domain }} 60 IN A {{ netspec.zones[zone].gateway }}"
          view-first: yes

      {% endif %}
      {% endfor %}

      server:
      {% for zone in opnsense_pxe_subnets %}
      {% if zone in netspec.zones and netspec.zones[zone].subnet is defined %}
          access-control-view: {{ netspec.zones[zone].subnet }} "pxe-{{ zone }}"
      {% endif %}
      {% endfor %}

- name: Deploy Unbound PXE views configuration
  ansible.builtin.copy:
    content: "{{ opn_pxe_dns_views_conf }}"
    dest: /usr/local/etc/unbound.opnsense.d/pxe-views.conf
    owner: root
    group: wheel
    mode: "0644"
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "root"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_python_interpreter: /usr/local/bin/python3
  register: opn_pxe_views_deployed

- name: Restart Unbound to load PXE views
  ansible.builtin.raw: configctl unbound start
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "root"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
  when: opn_pxe_views_deployed.changed

- name: Check Unbound is running after views deploy
  ansible.builtin.raw: unbound-control -c /var/unbound/unbound.conf status
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "root"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
  register: opn_pxe_unbound_check
  changed_when: false

- name: Assert Unbound is running
  ansible.builtin.assert:
    that:
      - "'is running' in opn_pxe_unbound_check.stdout"
    fail_msg: "Unbound is not running after PXE views deploy: {{ opn_pxe_unbound_check.stdout }}"
