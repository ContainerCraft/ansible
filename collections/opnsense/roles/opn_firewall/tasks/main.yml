---
# Zone firewall: aliases, zone policy matrix, savepoint-wrapped.
#
# Savepoint covers firewall/filter only. Aliases are outside the savepoint
# controller and are created+applied first.
#
# Each zone requires an identifier field (lan, opt1, opt2...) set by
# the operator in netspec.zones after interface assignment.

# Build the referenced zones list first — used by alias filter and assert.
- name: Build list of zones referenced in firewall matrix
  ansible.builtin.set_fact:
    opn_fw_all_referenced_zones: >-
      {{ (
        (firewall_matrix.deny_all | default([]) | map(attribute='from') | list)
        + (firewall_matrix.dhcp_allow | default([]) | map(attribute='from') | list)
        + (firewall_matrix.pre_isolation_allows | default([]) | map(attribute='from') | list)
        + (firewall_matrix.isolation | default([]) | map(attribute='from') | list)
        + (firewall_matrix.allows | default([]) | map(attribute='from') | list)
        + (firewall_matrix.wan_egress | default([]) | map(attribute='from') | list)
        + (firewall_matrix.pre_isolation_allows | default([]) | map(attribute='to') | list)
        + (firewall_matrix.isolation | default([]) | map(attribute='to') | list)
        + (firewall_matrix.allows | default([]) | map(attribute='to') | list)
      ) | unique | reject('in', ['wan', 'any', 'cluster_dns']) | list }}

- name: Create per-zone network aliases
  oxlorg.opnsense.alias:
    name: "{{ item.key }}_net"
    type: network
    content: ["{{ item.value.subnet }}"]
    description: "{{ opnsense_managed_tag }} zone net {{ item.key }}"
    state: present
    reload: false
  loop: "{{ netspec.zones | dict2items }}"
  loop_control:
    label: "{{ item.key }}_net"
  when:
    - item.value.enabled | default(true) | bool
    - item.value.subnet is defined
    - item.key in opn_fw_all_referenced_zones or item.value.role | default('') == 'cluster'

- name: Create cluster DNS host alias
  oxlorg.opnsense.alias:
    name: cluster_dns
    type: host
    content: ["{{ netspec.cluster_dns }}"]
    description: "{{ opnsense_managed_tag }} cluster DNS resolver"
    state: present
    reload: false
  when: netspec.cluster_dns is defined

- name: Apply alias changes
  oxlorg.opnsense.reload:
    target: "alias"
  when: not ansible_check_mode

- name: Assert all referenced zones have identifiers
  ansible.builtin.assert:
    that:
      - item in netspec.zones
      - netspec.zones[item].identifier is defined
    fail_msg: >-
      Zone '{{ item }}' referenced in firewall matrix but has no identifier
      in netspec.zones. Add identifier: "<opt_id>" to the zone definition.
  loop: "{{ opn_fw_all_referenced_zones }}"

- name: Create firewall savepoint
  oxlorg.opnsense.savepoint:
    action: create
    controller: filter
  register: opn_firewall_savepoint
  when: not ansible_check_mode

- name: Flatten firewall matrix rows
  ansible.builtin.set_fact:
    opn_firewall_rules: >-
      {{
        (firewall_matrix.deny_all | default([]) | list)
        + (firewall_matrix.dhcp_allow | default([]) | list)
        + (firewall_matrix.pre_isolation_allows | default([]) | list)
        + (firewall_matrix.isolation | default([]) | list)
        + (firewall_matrix.allows | default([]) | list)
        + (firewall_matrix.wan_egress | default([]) | list)
      }}

- name: Apply firewall rules
  oxlorg.opnsense.rule:
    sequence: "{{ item.seq }}"
    quick: true
    direction: in
    ip_protocol: "{{ item.ip_proto | default('inet') }}"
    interface: ["{{ netspec.zones[item.from].identifier }}"]
    action: "{{ item.action }}"
    protocol: "{{ item.proto | default('any') }}"
    source_net: "{{ item.src | default(item.from ~ '_net') }}"
    destination_net: "{{ 'any' if item.to in ['wan', 'any'] else (item.to if item.to == 'cluster_dns' else item.to ~ '_net') }}"
    destination_port: "{{ item.port | default(omit) }}"
    icmp_type: "{{ item.icmp_type | default(omit) }}"
    log: "{{ item.log | default(true) }}"
    state_policy: "{{ 'floating' if (opnsense_ha_enabled | bool) else '' }}"
    description: "{{ opnsense_managed_tag }} {{ item.desc }}"
    match_fields: ["description"]
    state: present
    reload: false
  loop: "{{ opn_firewall_rules }}"
  loop_control:
    label: "seq {{ item.seq }} {{ item.desc }}"

- name: Apply firewall rule changes
  oxlorg.opnsense.reload:
    target: "rule"
  when: not ansible_check_mode

- name: Verify API still reachable after firewall apply
  oxlorg.opnsense.list:
    target: "rule"
  register: opn_firewall_verify
  when: not ansible_check_mode

- name: Commit firewall changes (cancel auto-rollback)
  oxlorg.opnsense.savepoint:
    action: cancel_rollback
    controller: filter
    revision: "{{ opn_firewall_savepoint.revision }}"
  when:
    - not ansible_check_mode
    - opn_firewall_savepoint.revision is defined
    - opn_firewall_verify is not failed
