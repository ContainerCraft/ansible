---
# =============================================================================
# Nginx web server — file hosting, PXE HTTP boot, reverse proxy
# =============================================================================

# --- Connection ---
opnsense_firewall_address: "{{ lookup('env', 'OPNSENSE_FIREWALL') | default('', true) }}"
opnsense_api_key: "{{ lookup('env', 'OPNSENSE_API_KEY') | default('', true) }}"
opnsense_api_secret: "{{ lookup('env', 'OPNSENSE_API_SECRET') | default('', true) }}"
opnsense_api_port: "{{ lookup('env', 'OPNSENSE_API_PORT') | default(443, true) }}"
opnsense_ssl_verify: "{{ lookup('env', 'OPNSENSE_SSL_VERIFY') | default(false, true) | bool }}"
opnsense_api_args:
  firewall: "{{ opnsense_firewall_address }}"
  api_key: "{{ opnsense_api_key }}"
  api_secret: "{{ opnsense_api_secret }}"
  api_port: "{{ opnsense_api_port }}"
  ssl_verify: "{{ opnsense_ssl_verify }}"

# --- Apply discipline ---
opnsense_managed_tag: "{{ lookup('env', 'OPNSENSE_MANAGED_TAG') | default('ansible-managed', true) }}"

# --- Master toggle ---
opnsense_nginx_enabled: false

# --- HTTP servers ---
# Each entry creates one Nginx server block (virtual host).
# Locations are created first, then referenced by the server.
opnsense_nginx_servers: []
# Example:
#   - servername: "boot.home.arpa"
#     listen_http: "8080"
#     description: "PXE HTTP boot server"
#     root: "/usr/local/tftp"
#     locations:
#       - description: "PXE boot files"
#         urlpattern: "/"
#         root: "/usr/local/tftp"
#         autoindex: true

# --- Upstreams (reverse proxy backends) ---
opnsense_nginx_upstreams: []
# Example:
#   - description: "kubernetes ingress"
#     servers:
#       - description: "op1"
#         server: "10.0.0.33"
#         port: 80
#         priority: 1
