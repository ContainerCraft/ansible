---
# Kea DHCPv4, per-zone scopes. Runs only when the phase serves zone DHCP.
#
# Each zone requires an identifier field (lan, opt1, opt2...) set by
# the operator in netspec.zones after interface assignment.
# fw_rules: false — DHCP allow rules are in the firewall matrix (opn_firewall).
# auto_options: false — explicit routers/dns prevents HA VIP mismatch.

- name: Disable Dnsmasq DHCP (conflicts with Kea)
  oxlorg.opnsense.dnsmasq_general:
    enabled: false
    reload: true
  when: opnsense_enforce_dnsmasq_disabled | bool

- name: Enable Kea Control Agent
  oxlorg.opnsense.dhcp_controlagent:
    enabled: true
    reload: false
  when: phase.zone_dhcp | bool

- name: Enable Kea DHCP on DHCP-serving zone gateways
  oxlorg.opnsense.dhcp_general:
    enabled: true
    interfaces: >-
      {{ netspec.zones | dict2items
         | selectattr('value.dhcp', 'defined')
         | selectattr('value.dhcp')
         | selectattr('value.identifier', 'defined')
         | map(attribute='value.identifier') | list }}
    fw_rules: false
    socket_type: "{{ opnsense_dhcp_socket_type }}"
    lifetime: "{{ opnsense_dhcp_default_lifetime }}"
    reload: false
  when: phase.zone_dhcp | bool

- name: Apply Kea general hardening (socket retries, decline probation)
  oxlorg.opnsense.raw:
    module: kea
    controller: dhcpv4
    command: set
    action: post
    data:
      dhcpv4:
        general: "{{ opnsense_dhcp_general_hardening | combine({'decline_probation_period': opnsense_dhcp_decline_probation_period}) }}"
        lexpire: "{{ opnsense_dhcp_lease_expiration }}"
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  when: phase.zone_dhcp | bool

- name: Configure per-zone Kea subnets
  oxlorg.opnsense.dhcp_subnet:
    subnet: "{{ item.value.subnet }}"
    description: "{{ opnsense_managed_tag }} {{ item.key }}"
    pools: ["{{ item.value.dhcp_pool }}"]
    auto_options: false
    gateway: ["{{ item.value.gateway }}"]
    dns: ["{{ item.value.gateway }}"]
    domain: "{{ netspec.cluster_domain | default('home.arpa') }}"
    domain_search: ["{{ netspec.cluster_domain | default('home.arpa') }}"]
    ntp_servers: ["{{ item.value.gateway }}"]
    next_server: "{{ item.value.pxe_next_server | default('') }}"
    tftp_server: "{{ item.value.pxe_tftp_server | default('') }}"
    tftp_file: "{{ item.value.pxe_tftp_file | default('') }}"
    match_fields: ["subnet"]
    state: present
    reload: false
  loop: "{{ netspec.zones | dict2items }}"
  loop_control:
    label: "{{ item.key }} {{ item.value.subnet | default('-') }}"
  when:
    - phase.zone_dhcp | bool
    - item.value.enabled | default(true) | bool
    - item.value.dhcp | default(false) | bool
    - item.value.subnet is defined

# Per-subnet hardening: allocator, match-client-id, valid_lifetime.
# These fields ARE in the OPNsense Kea model (KeaDhcpv4.xml subnet4 array)
# but NOT in FIELDS_CHANGE of the oxlorg dhcp_subnet module, so they must
# be set via raw API on the existing subnet UUID after the module creates it.
- name: Search for created subnet UUIDs
  oxlorg.opnsense.raw:
    module: kea
    controller: dhcpv4
    command: search_subnet
    action: get
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  register: opn_dhcp_subnets
  when:
    - phase.zone_dhcp | bool
    - not ansible_check_mode

- name: Apply per-subnet hardening (allocator, match-client-id, valid_lifetime)
  oxlorg.opnsense.raw:
    module: kea
    controller: dhcpv4
    command: "set_subnet/{{ _subnet_uuid }}"
    action: post
    data:
      subnet4: "{{ opnsense_dhcp_subnet_overrides[item.key] }}"
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  vars:
    _matching: "{{ opn_dhcp_subnets.response.rows | default([]) | selectattr('subnet', 'equalto', item.value.subnet) | list }}"
    _subnet_uuid: "{{ (_matching | first).uuid if _matching | length > 0 else 'MISSING' }}"
  loop: "{{ netspec.zones | dict2items }}"
  loop_control:
    label: "{{ item.key }} {{ item.value.subnet | default('-') }}"
  when:
    - phase.zone_dhcp | bool
    - not ansible_check_mode
    - item.value.enabled | default(true) | bool
    - item.value.dhcp | default(false) | bool
    - item.value.subnet is defined
    - item.key in opnsense_dhcp_subnet_overrides
    - _subnet_uuid != 'MISSING'

- name: Create Kea DHCP reservations per host interface
  oxlorg.opnsense.dhcp_reservation:
    ip: "{{ item.1.ip }}"
    mac: "{{ item.0.mac }}"
    hostname: "{{ item.0.hostname | default(omit) }}"
    subnet: "{{ item.1.subnet }}"
    description: "{{ opnsense_managed_tag }} {{ item.0.description | default(item.0.hostname) }}"
    state: present
    reload: false
  loop: "{{ netspec.hosts | default([]) | selectattr('mac', 'defined') | subelements('interfaces') }}"
  loop_control:
    label: "{{ item.1.ip }} {{ item.0.mac }} {{ item.0.hostname | default('') }}"
  when: phase.zone_dhcp | bool

- name: Create static ARP entries per host interface
  oxlorg.opnsense.neighbor:
    description: "{{ opnsense_managed_tag }} {{ item.0.hostname }} {{ item.1.subnet }}"
    ethernet_address: "{{ item.0.mac }}"
    ip_address: "{{ item.1.ip }}"
    state: present
    reload: false
  loop: "{{ netspec.hosts | default([]) | selectattr('mac', 'defined') | selectattr('static_arp', 'defined') | selectattr('static_arp') | subelements('interfaces') }}"
  loop_control:
    label: "{{ item.1.ip }} {{ item.0.mac }} {{ item.0.hostname }}"
  when: phase.zone_dhcp | bool
  register: opn_dhcp_neighbor_result

- name: Apply static ARP changes
  oxlorg.opnsense.raw:
    module: interfaces
    controller: neighbor_settings
    command: reconfigure
    action: post
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  when:
    - phase.zone_dhcp | bool
    - not ansible_check_mode
    - opn_dhcp_neighbor_result.changed | default(false)

- name: Apply Kea DHCP changes
  oxlorg.opnsense.reload:
    target: "kea"
  when:
    - phase.zone_dhcp | bool
    - not ansible_check_mode
