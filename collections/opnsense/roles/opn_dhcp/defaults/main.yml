---
# --- Connection ---
opnsense_firewall_address: "{{ lookup('env', 'OPNSENSE_FIREWALL') | default('', true) }}"
opnsense_api_key: "{{ lookup('env', 'OPNSENSE_API_KEY') | default('', true) }}"
opnsense_api_secret: "{{ lookup('env', 'OPNSENSE_API_SECRET') | default('', true) }}"
opnsense_api_port: "{{ lookup('env', 'OPNSENSE_API_PORT') | default(443, true) }}"
opnsense_ssl_verify: "{{ lookup('env', 'OPNSENSE_SSL_VERIFY') | default(false, true) | bool }}"
opnsense_api_args:
  firewall: "{{ opnsense_firewall_address }}"
  api_key: "{{ opnsense_api_key }}"
  api_secret: "{{ opnsense_api_secret }}"
  api_port: "{{ opnsense_api_port }}"
  ssl_verify: "{{ opnsense_ssl_verify }}"

# --- Apply discipline ---
opnsense_reload: false
opnsense_managed_tag: "{{ lookup('env', 'OPNSENSE_MANAGED_TAG') | default('ansible-managed', true) }}"

# --- DHCP ---
opnsense_enforce_dnsmasq_disabled: "{{ lookup('env', 'OPNSENSE_ENFORCE_DNSMASQ_DISABLED') | default(false, true) | bool }}"
opnsense_dhcp_socket_type: "raw"
opnsense_dhcp_default_lifetime: 7200

# --- Kea general hardening (set via raw API; fields in OPNsense model) ---
opnsense_dhcp_general_hardening:
  service_sockets_max_retries: "5"
  service_sockets_retry_wait_time: "5000"

# --- Per-subnet settings (set via raw API after oxlorg creates the subnet) ---
# allocator: random prevents predictable address assignment
# match-client-id: "0" for IoT (unstable client IDs), "1" for others
# valid_lifetime: per-zone lease duration in seconds
opnsense_dhcp_subnet_overrides:
  cluster:
    allocator: "random"
    match-client-id: "1"
    valid_lifetime: "14400"
  mgmt:
    allocator: "random"
    match-client-id: "1"
    valid_lifetime: "7200"
  iot:
    allocator: "random"
    match-client-id: "0"
    valid_lifetime: "3600"
  dmz:
    allocator: "random"
    match-client-id: "1"
    valid_lifetime: "3600"
  clients:
    allocator: "random"
    match-client-id: "1"
    valid_lifetime: "7200"

# --- Kea lease expiration tuning (lexpire in OPNsense model) ---
opnsense_dhcp_lease_expiration:
  reclaim_timer_wait_time: "10"
  flush_reclaimed_timer_wait_time: "25"
  hold_reclaimed_time: "3600"
  max_reclaim_leases: "100"
  max_reclaim_time: "250"
  unwarned_reclaim_cycles: "5"

# --- Kea decline probation period (seconds) ---
opnsense_dhcp_decline_probation_period: "86400"

# --- Data fallback ---
netspec:
  cluster_domain: "home.arpa"
  zones: {}
phase:
  zone_dhcp: false
