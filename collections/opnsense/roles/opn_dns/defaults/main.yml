---
# --- Connection ---
opnsense_firewall_address: "{{ lookup('env', 'OPNSENSE_FIREWALL') | default('', true) }}"
opnsense_api_key: "{{ lookup('env', 'OPNSENSE_API_KEY') | default('', true) }}"
opnsense_api_secret: "{{ lookup('env', 'OPNSENSE_API_SECRET') | default('', true) }}"
opnsense_api_port: "{{ lookup('env', 'OPNSENSE_API_PORT') | default(443, true) }}"
opnsense_ssl_verify: "{{ lookup('env', 'OPNSENSE_SSL_VERIFY') | default(false, true) | bool }}"
opnsense_api_args:
  firewall: "{{ opnsense_firewall_address }}"
  api_key: "{{ opnsense_api_key }}"
  api_secret: "{{ opnsense_api_secret }}"
  api_port: "{{ opnsense_api_port }}"
  ssl_verify: "{{ opnsense_ssl_verify }}"

# --- Apply discipline ---
opnsense_reload: false
opnsense_managed_tag: "{{ lookup('env', 'OPNSENSE_MANAGED_TAG') | default('ansible-managed', true) }}"

# --- Unbound general (exposed by oxlorg unbound_general module) ---
opnsense_dns_dnssec: true
opnsense_dns_dns64: false
opnsense_dns_dns64_prefix: "64:ff9b::/96"
opnsense_dns_register_dhcp_static_mappings: true
opnsense_dns_register_dhcp_leases: false
opnsense_dns_noregrecords: true

# --- Unbound hardening (all fields map to unbound.advanced.* in OPNsense API) ---
# Field names match the OPNsense Unbound model (Unbound.xml) exactly.
# Posted via raw API because the oxlorg unbound_general module only manages
# unbound.general.* fields.
#
# Fields NOT in the OPNsense model (cannot be set via API):
#   use-caps-for-id, deny-any, ip-ratelimit, ratelimit, answer-cookie,
#   local-zone per-domain nodefault
#
# privateaddress replaces the model default when set — must include the
# full list (model default is RFC 1918 + test-net + documentation ranges).
opnsense_dns_hardening:
  hideidentity: "1"
  hideversion: "1"
  prefetch: "1"
  prefetchkey: "1"
  dnssecstripped: "1"
  belownxdomain: "1"
  aggressivensec: "1"
  qnameminstrict: "0"
  serveexpired: "1"
  serveexpiredttl: "86400"
  serveexpiredttlreset: "1"
  serveexpiredclienttimeout: "1800"
  privatedomain: "home.arpa"
  privateaddress: "0.0.0.0/8,10.0.0.0/8,100.64.0.0/10,169.254.0.0/16,172.16.0.0/12,192.0.2.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,233.252.0.0/24,::1/128,2001:db8::/32,fc00::/8,fd00::/8,fe80::/10"
  insecuredomain: "home.arpa"
  unwantedreplythreshold: "10000000"
  logservfail: "1"
  valloglevel: "1"
  extendedstatistics: "1"

# --- Unbound ACL default action ---
opnsense_dns_acl_default_action: "refuse"

# --- Unbound ACLs (per zone subnet) ---
opnsense_dns_acls:
  - name: mgmt
    action: allow_snoop
    networks: ["10.10.0.0/24"]
    description: "{{ opnsense_managed_tag }} mgmt zone (admin snoop)"
  - name: iot
    action: allow
    networks: ["10.20.0.0/24"]
    description: "{{ opnsense_managed_tag }} iot zone"
  - name: dmz
    action: allow
    networks: ["10.30.0.0/24"]
    description: "{{ opnsense_managed_tag }} dmz zone"
  - name: cluster
    action: allow
    networks: ["10.0.0.0/24"]
    description: "{{ opnsense_managed_tag }} cluster zone"
  - name: clients
    action: allow
    networks: ["10.100.0.0/24"]
    description: "{{ opnsense_managed_tag }} clients zone"

# --- Unbound DNSBL policies ---
# Each entry creates one DNSBL policy. providers is a list of predefined
# source type codes. source_networks scopes the policy to specific subnets
# (empty = all). nxdomain: true returns NXDOMAIN instead of 0.0.0.0.
opnsense_dns_dnsbl:
  - name: "ansible-managed threat intelligence"
    providers: ["atf", "hgz011"]
    nxdomain: true
  - name: "ansible-managed ad and tracker blocking"
    providers: ["oisd0", "ep"]
    source_networks: ["10.100.0.0/24", "10.20.0.0/24", "10.30.0.0/24"]
    nxdomain: true

# --- DNS over TLS (upstream encrypted resolution) ---
# Cloudflare 1.1.1.1 for Families (malware blocking) on port 853.
# Verify CN ensures TLS certificate authenticity — prevents MITM.
opnsense_dns_dot:
  - domain: ""
    server: "1.1.1.2"
    port: "853"
    verify_cn: "cloudflare-dns.com"
    description: "ansible-managed Cloudflare DoT primary"
  - domain: ""
    server: "1.0.0.2"
    port: "853"
    verify_cn: "cloudflare-dns.com"
    description: "ansible-managed Cloudflare DoT secondary"

# --- Unbound cache sizing (bare metal with significant RAM) ---
opnsense_dns_cache:
  msgcachesize: "256m"
  rrsetcachesize: "512m"
  outgoingrange: "8192"
  numqueriesperthread: "4096"
  infracachenumhosts: "20000"

# --- SSH user for config file write (home.arpa nodefault override) ---
opnsense_dns_ssh_user: "{{ lookup('env', 'OPNSENSE_SSH_USER') | default('root', true) }}"

# --- DNS data fallback ---
netspec:
  cluster_domain: "home.arpa"
  cluster_dns: ""
  hosts: []
