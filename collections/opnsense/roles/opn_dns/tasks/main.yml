---
# Unbound resolver: general settings, hardening, cache, ACL default, ACLs,
# DNSBL, local-zone nodefault, split-horizon forwarding, and static host
# reservations.
#
# register_dhcp_static_mappings: true — Kea static reservations sync to
# Unbound on service restart. Dynamic Kea leases are NOT registered (ISC
# DHCP only). register_dhcp_leases: false because it reads dhcpd.leases
# which Kea does not write.
#
# dhcp_domain: set to the cluster domain so DHCP-registered hostnames
# resolve under home.arpa (not bare hostnames).

- name: Enable Unbound resolver
  oxlorg.opnsense.unbound_general:
    enabled: true
    port: 53
    dnssec: "{{ opnsense_dns_dnssec }}"
    dns64: "{{ opnsense_dns_dns64 }}"
    dns64_prefix: "{{ opnsense_dns_dns64_prefix }}"
    register_dhcp_static_mappings: "{{ opnsense_dns_register_dhcp_static_mappings }}"
    register_dhcp_leases: "{{ opnsense_dns_register_dhcp_leases }}"
    register_system_records: "{{ not opnsense_dns_noregrecords }}"
    dhcp_domain: "{{ netspec.cluster_domain }}"
    reload: false

# Hardening, privacy, rebinding protection, DNSSEC insecure domain,
# observability, cache sizing, and serve-expired resilience.
# Raw API set always returns "saved" — changed_when is a known limitation
# of oxlorg.opnsense.raw (no diff support). The fields ARE idempotent on
# the OPNsense side — config.xml is only written when values differ.
- name: Apply Unbound hardening, cache, and security settings
  oxlorg.opnsense.raw:
    module: unbound
    controller: settings
    command: set
    action: post
    data:
      unbound:
        advanced: "{{ opnsense_dns_hardening | combine(opnsense_dns_cache) }}"
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"

- name: Set Unbound ACL default action
  oxlorg.opnsense.raw:
    module: unbound
    controller: settings
    command: set
    action: post
    data:
      unbound:
        acls:
          default_action: "{{ opnsense_dns_acl_default_action }}"
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"

# Per-zone ACLs
- name: Configure Unbound ACLs per zone
  oxlorg.opnsense.unbound_acl:
    name: "{{ item.name }}"
    action: "{{ item.action }}"
    networks: "{{ item.networks }}"
    description: "{{ item.description }}"
    state: present
    reload: false
  loop: "{{ opnsense_dns_acls }}"
  loop_control:
    label: "{{ item.name }}"

# DNSBL policies — idempotent via the unbound_dnsbl module. Each entry
# is matched by name. Providers can be combined in a single policy.
# source_networks scopes policies to specific subnets (empty = all).
- name: Configure DNSBL policies
  oxlorg.opnsense.unbound_dnsbl:
    name: "{{ item.name }}"
    providers: "{{ item.providers }}"
    source_networks: "{{ item.source_networks | default([]) }}"
    domains_allow: "{{ item.domains_allow | default([]) }}"
    domains_block: "{{ item.domains_block | default([]) }}"
    wildcard_domains_block: "{{ item.wildcard_domains_block | default([]) }}"
    nxdomain: "{{ item.nxdomain | default(false) }}"
    enabled: true
    state: present
    reload: true
  loop: "{{ opnsense_dns_dnsbl }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create DNSBL update cron job (daily at 03:30)
  oxlorg.opnsense.cron:
    description: "{{ opnsense_managed_tag }} Update Unbound DNSBLs"
    command: "unbound dnsbl"
    minutes: "30"
    hours: "3"
    state: present
    reload: true

# Override the built-in home.arpa static local zone (RFC 8375). Without
# this, queries for *.home.arpa return NXDOMAIN from the built-in zone
# and never reach the forward zone.
#
# The OPNsense MVC model has no per-domain local-zone override field.
# The supported mechanism is a persistent drop-in .conf file in
# /usr/local/etc/unbound.opnsense.d/ (documented in the OPNsense manual
# under Unbound → Advanced Configurations). start.sh copies these into
# /var/unbound/etc/ on every restart. Files placed directly in
# /var/unbound/etc/ are wiped on restart and do not persist.
#
# This task requires SSH access to the firewall (same as bootstrap).
# The file is NOT synced via XMLRPC HA sync — when HA is enabled, a
# second task must copy it to the backup node.
- name: Write home.arpa nodefault local-zone override
  ansible.builtin.copy:
    content: |
      server:
        local-zone: "home.arpa." nodefault
    dest: /usr/local/etc/unbound.opnsense.d/home-arpa-nodefault.conf
    owner: root
    group: wheel
    mode: "0644"
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[inventory_hostname].opnsense_dns_ssh_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_python_interpreter: /usr/local/bin/python3
    ansible_become: true

- name: Validate Unbound configuration
  ansible.builtin.raw: configctl unbound check
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[inventory_hostname].opnsense_dns_ssh_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_become: true
  register: opn_dns_check_result
  changed_when: false
  failed_when: opn_dns_check_result.rc != 0

- name: Configure DNS over TLS upstream resolvers
  oxlorg.opnsense.unbound_dot:
    domain: "{{ item.domain }}"
    target: "{{ item.server }}"
    port: "{{ item.port }}"
    verify: "{{ item.verify_cn }}"
    state: present
    reload: false
  loop: "{{ opnsense_dns_dot | default([]) }}"
  loop_control:
    label: "{{ item.server }}:{{ item.port }} ({{ item.verify_cn }})"

- name: Forward internal zone to cluster CoreDNS
  oxlorg.opnsense.unbound_forward:
    domain: "{{ netspec.cluster_domain }}"
    target: "{{ netspec.cluster_dns }}"
    port: 53
    description: "{{ opnsense_managed_tag }} {{ netspec.cluster_domain }} to cluster dns"
    state: present
    enabled: true
    reload: false

- name: Create DNS host entries per interface
  oxlorg.opnsense.unbound_host:
    hostname: "{{ item.0.hostname }}"
    domain: "{{ item.0.domain | default(netspec.cluster_domain) }}"
    record_type: "A"
    value: "{{ item.1.ip }}"
    description: "{{ opnsense_managed_tag }} static {{ item.0.hostname }} {{ item.1.subnet }}"
    match_fields: ["hostname", "domain", "value"]
    state: present
    reload: false
  loop: "{{ netspec.hosts | default([]) | subelements('interfaces') }}"
  loop_control:
    label: "{{ item.0.hostname }}.{{ item.0.domain | default(netspec.cluster_domain) }} -> {{ item.1.ip }}"

- name: Create DNS alias entries from unified inventory
  oxlorg.opnsense.unbound_host_alias:
    alias: "{{ item.1.hostname }}"
    domain: "{{ item.1.domain | default(netspec.cluster_domain) }}"
    target: "{{ item.0.hostname }}.{{ item.0.domain | default(netspec.cluster_domain) }}"
    description: "{{ opnsense_managed_tag }} alias {{ item.1.hostname }}"
    state: present
    reload: false
  loop: "{{ netspec.hosts | default([]) | subelements('aliases', skip_missing=True) }}"
  loop_control:
    label: "{{ item.1.hostname }}.{{ item.1.domain | default(netspec.cluster_domain) }} -> {{ item.0.hostname }}"

# Unbound views for multi-homed hosts. Hosts with >1 interface need
# per-subnet resolution so each subnet gets the correct local IP.
# Generated as a drop-in conf in /usr/local/etc/unbound.opnsense.d/.
- name: Build Unbound views for multi-homed hosts
  ansible.builtin.set_fact:
    opn_dns_views_conf: |
      # Managed by ansible — per-subnet DNS views for multi-homed hosts
      {% set ns = namespace(subnets={}) %}
      {% for host in netspec.hosts | default([]) if host.interfaces | default([]) | length > 1 %}
      {% for iface in host.interfaces %}
      {% if iface.subnet not in ns.subnets %}
      {% set _ = ns.subnets.update({iface.subnet: []}) %}
      {% endif %}
      {% set _ = ns.subnets[iface.subnet].append({'hostname': host.hostname, 'domain': host.domain | default(netspec.cluster_domain), 'ip': iface.ip}) %}
      {% endfor %}
      {% endfor %}
      {% for subnet, entries in ns.subnets.items() %}

      view:
          name: "view-{{ subnet | regex_replace('[./]', '-') }}"
      {% for entry in entries %}
          local-data: "{{ entry.hostname }}.{{ entry.domain }} 60 IN A {{ entry.ip }}"
      {% endfor %}
          view-first: yes

      {% endfor %}
      server:
      {% for subnet in ns.subnets %}
          access-control-view: {{ subnet }} "view-{{ subnet | regex_replace('[./]', '-') }}"
      {% endfor %}

- name: Remove legacy PXE views config (replaced by multi-homed views)
  ansible.builtin.file:
    path: /usr/local/etc/unbound.opnsense.d/pxe-views.conf
    state: absent
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[inventory_hostname].opnsense_dns_ssh_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_python_interpreter: /usr/local/bin/python3
    ansible_become: true

- name: Deploy Unbound views for multi-homed hosts
  ansible.builtin.copy:
    content: "{{ opn_dns_views_conf }}"
    dest: /usr/local/etc/unbound.opnsense.d/multihomed-views.conf
    owner: root
    group: wheel
    mode: "0644"
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[inventory_hostname].opnsense_dns_ssh_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_python_interpreter: /usr/local/bin/python3
    ansible_become: true
  register: opn_dns_views_result

# Reconfigure when no drop-in file changed (soft reload, no DNS outage).
- name: Reconfigure Unbound (soft reload)
  oxlorg.opnsense.reload:
    target: "unbound"
  when:
    - not ansible_check_mode
    - not (opn_dns_nodefault_result.changed | default(false))
    - not (opn_dns_views_result.changed | default(false))

# Full stop+start when drop-in files changed — start.sh copies files
# from /usr/local/etc/unbound.opnsense.d/ into /var/unbound/etc/.
# reconfigureGeneral does not run start.sh and misses drop-in files.
- name: Stop Unbound (drop-in files changed)
  oxlorg.opnsense.service:
    name: "unbound"
    action: "stop"
  when:
    - not ansible_check_mode
    - (opn_dns_nodefault_result.changed | default(false)) or (opn_dns_views_result.changed | default(false))

- name: Start Unbound (drop-in files changed)
  oxlorg.opnsense.service:
    name: "unbound"
    action: "start"
  when:
    - not ansible_check_mode
    - (opn_dns_nodefault_result.changed | default(false)) or (opn_dns_views_result.changed | default(false))
