---
# Squid caching proxy — orchestrator.
# Includes sub-task files by concern, gated by enable toggles.
# All module tasks use reload: false. A single reconfigure at the
# end applies all changes atomically.

- name: Include proxy general settings
  ansible.builtin.include_tasks: general.yml
  when: opnsense_proxy_enabled | bool

- name: Include proxy forward settings
  ansible.builtin.include_tasks: forward.yml
  when: opnsense_proxy_enabled | bool

- name: Include proxy cache settings
  ansible.builtin.include_tasks: cache.yml
  when: opnsense_proxy_enabled | bool

- name: Include proxy ACL settings
  ansible.builtin.include_tasks: acl.yml
  when: opnsense_proxy_enabled | bool

- name: Include proxy traffic management
  ansible.builtin.include_tasks: traffic.yml
  when: opnsense_proxy_enabled | bool

- name: Include proxy authentication
  ansible.builtin.include_tasks: auth.yml
  when:
    - opnsense_proxy_enabled | bool
    - opnsense_proxy_mode not in ['transparent', 'intercept']
    - opnsense_proxy_auth_method | default('') | length > 0

- name: Include proxy ICAP settings
  ansible.builtin.include_tasks: icap.yml
  when:
    - opnsense_proxy_enabled | bool
    - opnsense_proxy_icap_enabled | bool

- name: Include proxy parent settings
  ansible.builtin.include_tasks: parent.yml
  when:
    - opnsense_proxy_enabled | bool
    - opnsense_proxy_parent_enabled | bool

- name: Include proxy remote ACLs
  ansible.builtin.include_tasks: remote_acl.yml
  when: opnsense_proxy_enabled | bool

- name: Include proxy PAC auto-configuration
  ansible.builtin.include_tasks: pac.yml
  when:
    - opnsense_proxy_enabled | bool
    - opnsense_proxy_pac_proxies | default([]) | length > 0

- name: Include transparent mode NAT rules
  ansible.builtin.include_tasks: nat.yml
  when:
    - opnsense_proxy_enabled | bool
    - opnsense_proxy_mode in ['transparent', 'intercept']

- name: Deploy transparent intercept port config
  ansible.builtin.copy:
    content: |
      {% for iface in (opnsense_proxy_nat_interfaces if opnsense_proxy_nat_interfaces | length > 0 else opnsense_proxy_interfaces) %}
      {% set gw = netspec.zones | dict2items | selectattr('value.identifier', 'equalto', iface) | map(attribute='value.gateway') | first %}
      http_port {{ gw }}:{{ opnsense_proxy_intercept_port }} intercept
      {% endfor %}
    dest: /usr/local/etc/squid/pre-auth/transparent-intercept.conf
    owner: root
    group: wheel
    mode: "0644"
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "root"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_python_interpreter: /usr/local/bin/python3
  when:
    - opnsense_proxy_enabled | bool
    - opnsense_proxy_mode in ['transparent', 'intercept']

- name: Stop proxy service
  oxlorg.opnsense.service:
    name: "proxy"
    action: "stop"
  when:
    - opnsense_proxy_enabled | bool
    - not ansible_check_mode

- name: Start proxy service
  oxlorg.opnsense.service:
    name: "proxy"
    action: "start"
  when:
    - opnsense_proxy_enabled | bool
    - not ansible_check_mode
