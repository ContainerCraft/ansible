---
# --- Connection ---
opnsense_firewall_address: "{{ lookup('env', 'OPNSENSE_FIREWALL') | default('', true) }}"
opnsense_api_key: "{{ lookup('env', 'OPNSENSE_API_KEY') | default('', true) }}"
opnsense_api_secret: "{{ lookup('env', 'OPNSENSE_API_SECRET') | default('', true) }}"
opnsense_api_port: "{{ lookup('env', 'OPNSENSE_API_PORT') | default(443, true) }}"
opnsense_ssl_verify: "{{ lookup('env', 'OPNSENSE_SSL_VERIFY') | default(false, true) | bool }}"
opnsense_api_args:
  firewall: "{{ opnsense_firewall_address }}"
  api_key: "{{ opnsense_api_key }}"
  api_secret: "{{ opnsense_api_secret }}"
  api_port: "{{ opnsense_api_port }}"
  ssl_verify: "{{ opnsense_ssl_verify }}"

# --- Apply discipline / object marker ---
opnsense_reload: false
opnsense_managed_tag: "{{ lookup('env', 'OPNSENSE_MANAGED_TAG') | default('ansible-managed', true) }}"

# --- Trunk-port preparation ---
opnsense_prepare_trunk_ports: "{{ lookup('env', 'OPNSENSE_PREPARE_TRUNK_PORTS') | default(false, true) | bool }}"
opnsense_bridge_description: ""
opnsense_bridge_keep_members: []

# --- Interface assignment and IP configuration (via SSH + config.xml) ---
# OPNsense 26.1 has no MVC API for interface assignment or per-interface IP.
# These are set via a PHP script rendered over SSH.
opnsense_assign_interfaces: "{{ lookup('env', 'OPNSENSE_ASSIGN_INTERFACES') | default(false, true) | bool }}"
opnsense_interface_assignments: []
opnsense_zone_bridges: []
opnsense_interfaces_ssh_user: "{{ lookup('env', 'OPNSENSE_SSH_USER') | default('root', true) }}"

# --- Interface data fallback ---
netspec:
  native_blackhole_vlan: 3999
  trunks: {}
  zones: {}
