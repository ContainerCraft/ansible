---
# VLAN interfaces on the trunk ports. L2/L3 interface creation only; no DHCP,
# no rules, no VIPs.
#
# The oxlorg interface_vlan module matches existing entries by description
# (FIELD_ID). Device names (vlanif) must be unique across all VLANs on the
# system. The module auto-generates vlan0.<tag> which collides when the same
# tag appears on multiple parent interfaces. This role pre-reads existing
# VLANs to reuse existing device names for adopted entries and generates
# unique names (vlan0.<tag>.<parent_index>) for new entries.

- name: Prepare trunk ports — exclude them from the existing bridge
  oxlorg.opnsense.interface_bridge:
    description: "{{ opnsense_bridge_description }}"
    members: "{{ opnsense_bridge_keep_members }}"
    state: present
    reload: false
  when:
    - opnsense_prepare_trunk_ports | bool
    - opnsense_bridge_description | length > 0

# Pre-read existing VLANs to build (interface, tag) → device name lookup.
# This prevents device name collisions on update and preserves existing
# device names for assigned VLANs that cannot be renamed.
- name: Read existing VLAN devices
  oxlorg.opnsense.list:
    target: "interface_vlan"
  register: opn_interfaces_existing_vlans

- name: Build existing VLAN device name lookup
  ansible.builtin.set_fact:
    opn_interfaces_device_lookup: >-
      {{ dict(
        opn_interfaces_existing_vlans.data | default([])
        | map(attribute='interface') | list
        | zip(opn_interfaces_existing_vlans.data | default([]) | map(attribute='vlan') | list)
        | map('join', ':')
        | list
        | zip(opn_interfaces_existing_vlans.data | default([]) | map(attribute='device') | list)
      ) }}

- name: Initialize VLAN assignment list
  ansible.builtin.set_fact:
    opn_interfaces_vlan_assignments: []

- name: Build zone-to-trunk interface assignments
  ansible.builtin.set_fact:
    opn_interfaces_vlan_assignments: >-
      {{ opn_interfaces_vlan_assignments + [
           { 'zone': item.0.key,
             'vlan': item.0.value.vlan,
             'parent': netspec.trunks[item.1].parent,
             'trunk': item.1 } ] }}
  loop: "{{ netspec.zones | dict2items | subelements('value.trunks', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.key }} vlan{{ item.0.value.vlan }} -> {{ item.1 }}"
  when:
    - item.0.value.enabled | default(true) | bool
    - item.0.value.tagged | default(false) | bool
    - item.0.value.vlan | int > 0

- name: Create native blackhole VLAN on each trunk parent
  oxlorg.opnsense.interface_vlan:
    interface: "{{ item.value.parent }}"
    vlan: "{{ netspec.native_blackhole_vlan }}"
    device: >-
      {{ opn_interfaces_device_lookup[item.value.parent ~ ':' ~ netspec.native_blackhole_vlan]
         | default('vlan0.' ~ netspec.native_blackhole_vlan ~ '.' ~ item.value.parent | regex_replace('[^0-9]', '')) }}
    description: "{{ opnsense_managed_tag }} native blackhole {{ item.key }}"
    reload: false
    state: present
  loop: "{{ netspec.trunks | dict2items }}"
  loop_control:
    label: "blackhole on {{ item.value.parent }} ({{ item.key }})"

- name: Create zone VLANs on their trunk parents
  oxlorg.opnsense.interface_vlan:
    interface: "{{ item.parent }}"
    vlan: "{{ item.vlan }}"
    device: >-
      {{ opn_interfaces_device_lookup[item.parent ~ ':' ~ item.vlan]
         | default('vlan0.' ~ item.vlan ~ '.' ~ item.parent | regex_replace('[^0-9]', '')) }}
    description: "{{ opnsense_managed_tag }} {{ item.zone }} {{ item.trunk }}"
    reload: false
    state: present
  loop: "{{ opn_interfaces_vlan_assignments | default([]) }}"
  loop_control:
    label: "{{ item.zone }} vlan{{ item.vlan }} on {{ item.parent }}"

- name: Apply VLAN interface changes
  oxlorg.opnsense.reload:
    target: "interface_vlan"
  when: not ansible_check_mode

# Interface assignment + IP configuration via SSH + config.xml.
# OPNsense 26.1 has no MVC API for interface assignment.
# assign_interface.php.j2 rendered via lookup('template'), delivered via raw.
- name: Write and execute interface assignment script
  ansible.builtin.raw: |
    cat > /tmp/konductor_assign_iface.php << 'EOPHP'
    {{ lookup('template', 'assign_interface.php.j2') }}
    EOPHP
    php /tmp/konductor_assign_iface.php
    RC=$?
    rm -f /tmp/konductor_assign_iface.php
    exit $RC
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[inventory_hostname].opnsense_interfaces_ssh_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_become: true
  register: opn_iface_assign_result
  changed_when: "'OPN_IFACE_STATUS=created' in opn_iface_assign_result.stdout or 'OPN_IFACE_STATUS=updated' in opn_iface_assign_result.stdout"
  failed_when: opn_iface_assign_result.rc != 0
  loop: "{{ opnsense_interface_assignments }}"
  loop_control:
    label: "{{ item.descr }} {{ item.device }} {{ item.ipaddr }}/{{ item.subnet }}"
  when: opnsense_assign_interfaces | bool

- name: Reconfigure assigned interfaces
  ansible.builtin.raw: >
    configctl interface reconfigure {{ (item.stdout_lines | select('match', 'OPN_IFACE_IDENT=') | first).split('=')[1] }}
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[inventory_hostname].opnsense_interfaces_ssh_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_become: true
  loop: "{{ opn_iface_assign_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item.descr | default('?') }}"
  when:
    - opnsense_assign_interfaces | bool
    - item.changed | default(false)

# Add newly assigned VLAN sub-interfaces to their declared bridge.
# The bridge field on an interface assignment entry declares which bridge
# (matched by description) the interface belongs to. The opt identifier
# comes from the PHP script output (OPN_IFACE_IDENT=optNN).
- name: Collect bridge member opt identifiers from assignment results
  ansible.builtin.set_fact:
    opn_interfaces_bridge_additions: >-
      {{ opn_interfaces_bridge_additions | default([]) + [{
           'bridge': item.item.bridge,
           'opt': (item.stdout_lines | select('match', 'OPN_IFACE_IDENT=') | first).split('=')[1]
         }] }}
  loop: "{{ opn_iface_assign_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item.descr | default('?') }} → {{ item.item.bridge | default('none') }}"
  when:
    - opnsense_assign_interfaces | bool
    - item.item.bridge is defined
    - item.stdout_lines is defined

- name: Debug — collected bridge additions
  ansible.builtin.debug:
    var: opn_interfaces_bridge_additions
  when: opn_interfaces_bridge_additions is defined

# Group collected additions by bridge description. For BRIDGE0, prepend the
# keep_members (em0/em3). For new per-zone bridges, members are only the
# collected VLAN sub-interface opts.
- name: Build per-bridge member lists
  ansible.builtin.set_fact:
    opn_interfaces_bridge_map: >-
      {{ opn_interfaces_bridge_map | default({}) | combine({
           item.bridge: (opn_interfaces_bridge_map | default({}))[item.bridge] | default([]) + [item.opt]
         }) }}
  loop: "{{ opn_interfaces_bridge_additions | default([]) }}"
  loop_control:
    label: "{{ item.bridge }} += {{ item.opt }}"
  when:
    - opnsense_assign_interfaces | bool
    - opn_interfaces_bridge_additions | default([]) | length > 0

- name: Debug — per-bridge member map
  ansible.builtin.debug:
    var: opn_interfaces_bridge_map
  when: opn_interfaces_bridge_map is defined

# Create/update bridges. BRIDGE0 gets keep_members prepended. New bridges
# get only their collected members. reload: false — deferred to one
# reconfigure after all bridges are configured.
- name: Create or update bridges with VLAN sub-interface members
  oxlorg.opnsense.interface_bridge:
    description: "{{ item.key }}"
    members: "{{ (opnsense_bridge_keep_members if item.key == opnsense_bridge_description else []) + item.value }}"
    state: present
    reload: false
  loop: "{{ opn_interfaces_bridge_map | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }} = {{ (opnsense_bridge_keep_members if item.key == opnsense_bridge_description else []) + item.value }}"
  when:
    - opnsense_assign_interfaces | bool
    - opn_interfaces_bridge_map is defined
    - opn_interfaces_bridge_map | length > 0

- name: Apply all bridge changes (single reconfigure)
  oxlorg.opnsense.raw:
    controller: bridge_settings
    module: interfaces
    command: reconfigure
    action: post
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  when:
    - opnsense_assign_interfaces | bool
    - opn_interfaces_bridge_map is defined
    - opn_interfaces_bridge_map | length > 0
    - not ansible_check_mode

# Read bridge description → device name mapping via API.
# searchItem returns bridgeif (bridge0, bridge1...) which the oxlorg list
# module strips from FIELDS_ALL. Raw GET is idempotent and check-mode safe.
- name: Get bridge device names via API
  oxlorg.opnsense.raw:
    controller: bridge_settings
    module: interfaces
    command: searchItem
    action: get
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  register: opn_bridge_search
  changed_when: false
  when:
    - opnsense_assign_interfaces | bool
    - opnsense_zone_bridges | default([]) | length > 0

- name: Build bridge description to device name map
  ansible.builtin.set_fact:
    opn_interfaces_bridge_device_map: >-
      {{ opn_bridge_search.response.rows
         | items2dict(key_name='descr', value_name='bridgeif') }}
  when:
    - opn_bridge_search is defined
    - opn_bridge_search.response is defined
    - opn_bridge_search.response.rows is defined

- name: Debug — bridge device map
  ansible.builtin.debug:
    var: opn_interfaces_bridge_device_map
  when: opn_interfaces_bridge_device_map is defined

# Assign per-zone bridges as OPNsense interfaces with gateway IPs.
# Same PHP script as VLAN assignment — bridge devices are just device names.
- name: Assign zone bridge interfaces with gateway IPs
  ansible.builtin.raw: |
    cat > /tmp/konductor_assign_iface.php << 'EOPHP'
    {{ lookup('template', 'assign_interface.php.j2') }}
    EOPHP
    php /tmp/konductor_assign_iface.php
    RC=$?
    rm -f /tmp/konductor_assign_iface.php
    exit $RC
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[inventory_hostname].opnsense_interfaces_ssh_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_become: true
    item:
      device: "{{ opn_interfaces_bridge_device_map[bridge_item.description] }}"
      descr: "{{ bridge_item.descr }}"
      ipaddr: "{{ bridge_item.ipaddr }}"
      subnet: "{{ bridge_item.subnet }}"
      enable: "1"
  register: opn_bridge_assign_result
  changed_when: "'OPN_IFACE_STATUS=created' in opn_bridge_assign_result.stdout or 'OPN_IFACE_STATUS=updated' in opn_bridge_assign_result.stdout"
  failed_when: opn_bridge_assign_result.rc != 0
  loop: "{{ opnsense_zone_bridges | default([]) }}"
  loop_control:
    loop_var: bridge_item
    label: "{{ bridge_item.descr }} {{ bridge_item.ipaddr }}/{{ bridge_item.subnet }}"
  when:
    - opnsense_assign_interfaces | bool
    - opnsense_zone_bridges is defined
    - opn_interfaces_bridge_device_map is defined
    - bridge_item.description in opn_interfaces_bridge_device_map

- name: Reconfigure zone bridge interfaces
  ansible.builtin.raw: >
    configctl interface reconfigure {{ (item.stdout_lines | select('match', 'OPN_IFACE_IDENT=') | first).split('=')[1] }}
  delegate_to: "{{ opnsense_api_args.firewall }}"
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[inventory_hostname].opnsense_interfaces_ssh_user }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
    ansible_become: true
  loop: "{{ opn_bridge_assign_result.results | default([]) }}"
  loop_control:
    label: "{{ item.bridge_item.descr | default('?') }}"
  when:
    - opnsense_assign_interfaces | bool
    - item.changed | default(false)
