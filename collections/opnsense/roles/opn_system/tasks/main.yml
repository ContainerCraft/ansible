---
# System baseline: sysctl tunables and identity (hostname/domain/timezone).
#
# Tunables use searchItem to read current state, then setItem/<uuid> for
# existing tunables or addItem for new ones. This prevents duplicate entries
# that addItem-only would create on re-runs.
#
# Identity uses core/initialsetup wizard (gated by opnsense_apply_identity).

- name: Ensure required OPNsense packages are installed
  oxlorg.opnsense.package:
    name: "{{ opnsense_packages }}"
    action: install
  when:
    - opnsense_packages | default([]) | length > 0
    - not ansible_check_mode
  failed_when:
    - opn_system_pkg_result is failed
    - opnsense_packages_fail_on_pending_upgrade | bool
  register: opn_system_pkg_result

- name: Read current tunables
  ansible.builtin.uri:
    url: "https://{{ opnsense_api_args.firewall }}:{{ opnsense_api_args.api_port }}/api/core/tunables/searchItem"
    method: GET
    url_username: "{{ opnsense_api_args.api_key }}"
    url_password: "{{ opnsense_api_args.api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_api_args.ssl_verify }}"
    return_content: true
    status_code: [200]
  register: opn_system_tunables_now

- name: Build current tunable maps (name→value, name→uuid)
  ansible.builtin.set_fact:
    opn_system_tunables_existing: >-
      {{ dict(opn_system_tunables_now.json.rows | default([]) | map(attribute='tunable') | list
              | zip(opn_system_tunables_now.json.rows | default([]) | map(attribute='value') | list)) }}
    opn_system_tunables_uuids: >-
      {{ dict(opn_system_tunables_now.json.rows | default([]) | map(attribute='tunable') | list
              | zip(opn_system_tunables_now.json.rows | default([]) | map(attribute='uuid') | list)) }}

- name: Update existing sysctl tunables on drift
  ansible.builtin.uri:
    url: "https://{{ opnsense_api_args.firewall }}:{{ opnsense_api_args.api_port }}/api/core/tunables/setItem/{{ opn_system_tunables_uuids[item.key] }}"
    method: POST
    url_username: "{{ opnsense_api_args.api_key }}"
    url_password: "{{ opnsense_api_args.api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_api_args.ssl_verify }}"
    body_format: json
    body:
      sysctl:
        tunable: "{{ item.key }}"
        value: "{{ item.value }}"
        descr: "{{ opnsense_managed_tag }}"
    status_code: [200]
  loop: "{{ opnsense_tunables | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  when:
    - item.key in opn_system_tunables_existing
    - opn_system_tunables_existing[item.key] != item.value
  changed_when: true
  notify: Reconfigure tunables

- name: Create new sysctl tunables
  ansible.builtin.uri:
    url: "https://{{ opnsense_api_args.firewall }}:{{ opnsense_api_args.api_port }}/api/core/tunables/addItem"
    method: POST
    url_username: "{{ opnsense_api_args.api_key }}"
    url_password: "{{ opnsense_api_args.api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_api_args.ssl_verify }}"
    body_format: json
    body:
      sysctl:
        tunable: "{{ item.key }}"
        value: "{{ item.value }}"
        descr: "{{ opnsense_managed_tag }}"
    status_code: [200]
  loop: "{{ opnsense_tunables | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  when:
    - item.key not in opn_system_tunables_existing
  changed_when: true
  notify: Reconfigure tunables

- name: Read current system identity
  oxlorg.opnsense.raw:
    module: core
    controller: initial_setup
    command: get
    action: get
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  register: opn_system_identity_now
  when: opnsense_apply_identity | bool

- name: Apply system identity and WAN on drift
  oxlorg.opnsense.raw:
    module: core
    controller: initial_setup
    command: configure
    action: post
    data:
      wizard:
        hostname: "{{ opnsense_hostname }}"
        domain: "{{ opnsense_domain }}"
        timezone: "{{ opnsense_timezone }}"
        interfaces:
          wan:
            ipv4_type: "{{ opnsense_wan_ipv4_type }}"
            blockpriv: "{{ opnsense_wan_block_private | ternary('1', '0') }}"
            blockbogons: "{{ opnsense_wan_block_bogons | ternary('1', '0') }}"
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  when:
    - opnsense_apply_identity | bool
    - >-
      (opn_system_identity_now.response.wizard.hostname | default('')) != opnsense_hostname or
      (opn_system_identity_now.response.wizard.domain | default('')) != opnsense_domain or
      (opn_system_identity_now.response.wizard.timezone | default('')) != opnsense_timezone
