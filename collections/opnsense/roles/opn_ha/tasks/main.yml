---
# CARP VIPs, HA config sync, and sync trigger.
# site.yml gates on opnsense_ha_enabled.

- name: Assert dedicated SYNC zone exists for pfsync
  ansible.builtin.assert:
    that:
      - netspec.zones.sync is defined
      - netspec.zones.sync.enabled | bool
      - netspec.zones.sync.peer is defined
    fail_msg: >-
      HA requires a dedicated SYNC zone (netspec.zones.sync with a peer address).
      pfsync must not ride the data trunk.

- name: Create CARP VIP per zone gateway
  oxlorg.opnsense.interface_vip:
    interface: "{{ item.key }}"
    address: "{{ item.value.gateway }}/{{ item.value.subnet.split('/')[1] }}"
    mode: carp
    vhid: "{{ opnsense_carp_vhid_base + item.value.vlan }}"
    advertising_base: 1
    advertising_skew: "{{ opnsense_carp_advskew }}"
    password: "{{ opnsense_carp_password }}"
    description: "{{ opnsense_managed_tag }} carp {{ item.key }}"
    match_fields: ["description"]
    state: present
    reload: false
  loop: "{{ netspec.zones | dict2items }}"
  loop_control:
    label: "carp {{ item.key }}"
  when:
    - item.value.enabled | default(true) | bool
    - item.value.role == 'zone'
    - item.value.gateway is defined
    - item.value.subnet is defined

- name: Apply VIP changes
  oxlorg.opnsense.reload:
    target: "interface_vip"
  when: not ansible_check_mode

- name: Configure HA synchronization
  oxlorg.opnsense.hasync_general:
    pfsync_interface: "sync"
    pfsync_peer_ip: "{{ netspec.zones.sync.peer }}"
    pfsync_version: "{{ opnsense_hasync_pfsyncversion }}"
    synchronize_to_ip: "{{ netspec.zones.sync.peer if (opnsense_carp_advskew | int == 0) else '' }}"
    username: "{{ opnsense_hasync_username }}"
    password: "{{ opnsense_hasync_password }}"
    syncitems: "{{ opnsense_hasync_syncitems }}"

- name: Push config sync and restart HA services on the peer
  oxlorg.opnsense.raw:
    module: core
    controller: hasync_status
    command: restart_all
    action: post
    firewall: "{{ opnsense_api_args.firewall }}"
    api_key: "{{ opnsense_api_args.api_key }}"
    api_secret: "{{ opnsense_api_args.api_secret }}"
    api_port: "{{ opnsense_api_args.api_port }}"
    ssl_verify: "{{ opnsense_api_args.ssl_verify }}"
  when:
    - opnsense_carp_advskew | int == 0
    - not ansible_check_mode
