[defaults]
inventory = ./inventory/hosts.yml
# Collections install into the playbook-adjacent `collections/` directory:
#   ansible-galaxy collection install -r requirements.yml -p collections
# Ansible ALWAYS searches a `collections/` dir next to the playbook, independent
# of collections_path and of any ANSIBLE_COLLECTIONS_PATH env var (the konductor
# devshell sets that to the vendored oxlorg store path, which would otherwise
# override a collections_path setting here). The adjacent dir is gitignored.
# containercraft.opnsense is sourced by directory from the monorepo working tree;
# oxlorg.opnsense comes from galaxy. See requirements.yml.
host_key_checking = False
display_skipped_hosts = True
# Fail rather than warn when a collection's requires_ansible is not satisfied.
collections_on_ansible_version_mismatch = error
