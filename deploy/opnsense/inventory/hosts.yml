---
# OPNsense edge routers. Modules run on the controller (connection: local) and
# reach each firewall's REST API; the inventory host is an API target, not SSH.
all:
  children:
    opnsense_nodes:
      hosts:
        opnsense-1:
          opnsense_firewall_address: "{{ lookup('env', 'OPNSENSE_FIREWALL') | default('10.0.0.1', true) }}"
          opnsense_carp_advskew: 0
      vars:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
