# =============================================================================
# Plugin services
# =============================================================================
# mDNS repeater — proxy multicast DNS between zone bridges.
# Max 5 interfaces. Enables Chromecast/AirPlay/printer discovery across VLANs.
opnsense_mdns_enabled: true
opnsense_mdns_interfaces: ["lan", "opt16", "opt17", "opt19"]

# LLDP — neighbor discovery across all interfaces.
opnsense_lldpd_enabled: true

# Wake-on-LAN — remote wake for wired infrastructure.
# Hosts with wol: true in the unified inventory are registered.
opnsense_wol_enabled: true

# Telegraf — metrics collection. Prometheus client endpoint on :9273.
# Scrape from cluster Prometheus when deployed.
opnsense_telegraf_enabled: true

# IDS disabled — OXL ids_general module incompatible with OPNsense 26.1
# (API changed 'ips' boolean to 'mode' select field). Needs upstream fix
# or local module patch before enabling.
opnsense_ids_enabled: false
opnsense_ids_interfaces: ["lan", "opt16", "opt17", "opt18", "opt19"]
opnsense_ids_block: false
opnsense_ids_promiscuous: true
opnsense_ids_syslog_alerts: true
