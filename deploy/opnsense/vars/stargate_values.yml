---
# Stargate deployment values. Credentials from environment (.env / sesame).
#
# =============================================================================
# INFRASTRUCTURE INVENTORY — Static IPs and Physical Topology
# =============================================================================
#
# OPNsense (stargate, i5-8500, 4x Intel em NIC):
#   re0          WAN        (DHCP from ISP)
#   bridge0         LAN        10.0.0.1/24    (em0 + em3 + vlan0.1.2)
#   bridge_mgmt     MGMT       10.10.0.1/24   (vlan0.10.1 + vlan0.10.2)
#   bridge_iot      IOT        10.20.0.1/24   (vlan0.20.1 + vlan0.20.2)
#   bridge_dmz      DMZ        10.30.0.1/24   (vlan0.30.1 + vlan0.30.2)
#   bridge_clients  CLIENTS    10.100.0.1/24  (vlan0.100.1 + vlan0.100.2)
#   vlan0.4000.1 SYNC       10.40.0.1/24
#   vlan0.1.1    TRANSIT    (no IP, qnap trunk)
#   vlan0.1.2    TRANSIT_POE(no IP, bridge0 member, poe trunk)
#   em0 → QNAP port 1       bridge0 member (untagged cluster LAN)
#   em1 → QNAP port 2       VLAN trunk (tagged 10/20/30/100)
#   em2 → NETGEAR port 5    VLAN trunk (tagged 1/10/20/30/100, PVID=3999)
#   em3 → Orbi WAN          bridge0 member (legacy WiFi)
#
# NETGEAR GS305EP (5-port PoE managed):
#   Management IP: 10.0.0.22/24 on VLAN 1 (Kea DHCP, currently dynamic)
#   MAC: 34:98:b5:ac:e3:0c
#   Port 1-2: PVID=100, VLAN 100 U (client access)
#   Port 3:   PVID=1, VLAN 1 U + tagged 10/20/30/100 (debug/workbench)
#   Port 4:   PVID=1, VLAN 1 U + tagged 10/20/30/100 (AP)
#   Port 5:   PVID=3999, all tagged (em2 trunk)
#
# QNAP QSW-M408S (8x 1G + 4x 10G SFP):
#   Management IP: 10.0.0.21/24 on VLAN 1 (static)
#   MAC: 24:5e:be:64:95:df
#   Port 1:   em0 (VLAN 1 U, bridge0 carrier)
#   Port 2:   em1 (VLAN 1 excluded, tagged 10/20/30/100, trunk)
#   Port 3:   workbench (VLAN 1 U + tagged 10/20/30/100)
#   Port 4:   mithril hardwire (VLAN 1 U + tagged 10/20/30/100)
#   Port 5:   Talos t640 future (VLAN 1 U)
#   Port 6:   Talos op1 1G (VLAN 1 U)
#   Port 7:   Talos op2 1G (VLAN 1 U)
#   Port 8:   Talos op3 1G (VLAN 1 U)
#   Port 9:   Talos op1 10G SFP (VLAN 1 U + tagged 10/20/30/100)
#   Port 10:  Talos op2 10G SFP (VLAN 1 U + tagged 10/20/30/100)
#   Port 11:  Talos op3 10G SFP (VLAN 1 U + tagged 10/20/30/100)
#   Port 12:  Talos t640 future 10G SFP (VLAN 1 U + tagged 10/20/30/100)
#
# UniFi UAP-AC-HD:
#   Management IP: 10.0.0.x/24 on VLAN 1 (Kea DHCP via bridge0)
#   MAC: 74:83:c2:14:af:99
#   Firmware: 6.7.35
#   Controller: mithril 10.0.0.184:8443 (docker compose)
#   SSIDs:
#     PrettyFlyForAWifi → VLAN 100 CLIENTS
#     HackThePlanet     → VLAN 10  MGMT
#     SkyNet            → VLAN 20  IOT
#     TheNeutralZone    → VLAN 30  DMZ
#
# Talos Kubernetes Cluster (optiplexprime, 3x Dell OptiPlex):
#   op1: 10.0.0.33/24  MAC d8:9e:f3:40:22:ac (1G) / fc:34:97:1e:79:d4 (10G)
#   op2: 10.0.0.34/24  MAC 54:bf:64:5d:09:39 (1G) / fc:34:97:1e:79:d1 (10G)
#   op3: 10.0.0.35/24  MAC d8:9e:f3:40:33:c8 (1G) / fc:34:97:1e:79:d2 (10G)
#   CoreDNS LB VIP: 10.0.0.51
#   Omni: usrbinkat.na-west-1.omni.siderolabs.io
#
# Mithril (Pop!_OS workstation, Dell dock):
#   eno2: QNAP port 4, 10.0.0.184/24 (bridge0, Kea DHCP)
#   MAC: cc:48:3a:77:f2:20
#   UniFi controller: docker compose at 10.0.0.184:8443
#
# Future static IP plan (Kea reservations, not yet implemented):
#   10.0.0.1   stargate (bridge0 gateway)
#   10.0.0.21  QNAP switch (static, set in QSS)
#   10.0.0.22  NETGEAR switch (static, set in NETGEAR UI)
#   10.0.0.23  UniFi AP (Kea reservation, pending)
#   10.0.0.33  op1 (Talos static)
#   10.0.0.34  op2 (Talos static)
#   10.0.0.35  op3 (Talos static)
#   10.0.0.51  CoreDNS LB VIP (Cilium L2)
#   10.0.0.184 mithril (Kea reservation, pending → Cilium L2 LB for UniFi)
#
# =============================================================================
# ITERATIVE ROLLOUT MODEL
# =============================================================================
# ./stargate.yml --tags connect|system|interfaces|dns|dhcp|firewall|ha
# --check --diff before every apply. One tag, one toggle per iteration.

# =============================================================================
# Migration posture — start safe, advance one phase at a time
# =============================================================================
# coexist:    zone VLANs/DNS up, NO zone DHCP, legacy LAN untouched   <-- START
# migrating:  zone DHCP/DNS active, legacy LAN still served
# hardening:  posture tightened, HA prepared, legacy still fallback
# converged:  legacy-segment edge DHCP/DNS withdrawn
network_phase: "{{ lookup('env', 'OPNSENSE_NETWORK_PHASE') | default('coexist', true) }}"

# =============================================================================
# API connection — from environment, do not inline secrets
# =============================================================================
opnsense_api_key: "{{ lookup('env', 'OPNSENSE_API_KEY') | default('', true) }}"
opnsense_api_secret: "{{ lookup('env', 'OPNSENSE_API_SECRET') | default('', true) }}"
opnsense_api_port: "{{ lookup('env', 'OPNSENSE_API_PORT') | default(443, true) }}"
opnsense_ssl_verify: "{{ lookup('env', 'OPNSENSE_SSL_VERIFY') | default(false, true) | bool }}"
opnsense_api_timeout: 120
opnsense_api_retries: 2

# =============================================================================
# Capability toggles
# =============================================================================

# opn_system — packages required on the firewall.
opnsense_packages:
  - "os-vnstat"
  - "os-mdns-repeater"
  - "os-lldpd"
  - "os-wol"
  - "os-acme-client"
  - "os-telegraf"
  - "os-upnp"
  - "os-squid"
  - "os-clamav"
  - "os-c-icap"
  - "os-nginx"

# opn_system — hostname/domain/timezone + WAN via initialsetup wizard.
# Disabled after initial configuration — wizard always reports changed and
# disrupts WAN during reconfigure. Enable only for deliberate identity changes.
opnsense_apply_identity: false
opnsense_hostname: "stargate"
opnsense_domain: "home.arpa"
opnsense_timezone: "America/Los_Angeles"
opnsense_wan_ipv4_type: "dhcp"
opnsense_wan_block_private: true
opnsense_wan_block_bogons: true

# opn_interfaces — prepare trunk ports removes em1/em2 from bridge0 before
# VLAN sub-interfaces are created on them. Required on clean/restored deploys
# where all 4 NICs are bridged. Uses reload: false to defer bridge reconfigure.
opnsense_prepare_trunk_ports: true
opnsense_bridge_description: "BRIDGE0"
opnsense_bridge_keep_members: ["opt4", "opt3"]

# opn_interfaces — VLAN device assignment + IP via SSH + config.xml.
# Per-zone bridges aggregate em1 (QNAP) and em2 (NETGEAR) VLAN sub-interfaces.
# Gateway IPs on bridges, not on individual VLAN sub-interfaces.
# Bridge members have no IP — same pattern as bridge0 with em0 + em3 + vlan0.1.2.
opnsense_assign_interfaces: true
opnsense_interfaces_ssh_user: "root"
opnsense_interface_assignments:
  # --- VLAN 1: transit (no IP, bridge0 members) ---
  - device: "vlan0.1.1"
    descr: "TRANSIT"
    ipaddr: ""
    subnet: ""
    enable: "1"
  - device: "vlan0.1.2"
    descr: "TRANSIT_POE"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE0"
  # --- VLAN 4000: sync (single trunk, no bridge needed) ---
  - device: "vlan0.4000.1"
    descr: "SYNC"
    ipaddr: "10.40.0.1"
    subnet: "24"
    enable: "1"
  # --- VLAN 10: mgmt (bridge members, no IP) ---
  - device: "vlan0.10.1"
    descr: "MGMT_QNAP"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE_MGMT"
  - device: "vlan0.10.2"
    descr: "MGMT_POE"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE_MGMT"
  # --- VLAN 20: iot (bridge members, no IP) ---
  - device: "vlan0.20.1"
    descr: "IOT_QNAP"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE_IOT"
  - device: "vlan0.20.2"
    descr: "IOT_POE"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE_IOT"
  # --- VLAN 30: dmz (bridge members, no IP) ---
  - device: "vlan0.30.1"
    descr: "DMZ_QNAP"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE_DMZ"
  - device: "vlan0.30.2"
    descr: "DMZ_POE"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE_DMZ"
  # --- VLAN 100: clients (bridge members, no IP) ---
  - device: "vlan0.100.1"
    descr: "CLIENTS_QNAP"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE_CLIENTS"
  - device: "vlan0.100.2"
    descr: "CLIENTS_POE"
    ipaddr: ""
    subnet: ""
    enable: "1"
    bridge: "BRIDGE_CLIENTS"

# Per-zone bridges — created after VLAN sub-interfaces are assigned.
# Each bridge gets the gateway IP and the zone description that firewall/DHCP
# resolve against. Kea and firewall rules target these bridges by description.
opnsense_zone_bridges:
  - description: "BRIDGE_MGMT"
    ipaddr: "10.10.0.1"
    subnet: "24"
    descr: "MGMT"
  - description: "BRIDGE_IOT"
    ipaddr: "10.20.0.1"
    subnet: "24"
    descr: "IOT"
  - description: "BRIDGE_DMZ"
    ipaddr: "10.30.0.1"
    subnet: "24"
    descr: "DMZ"
  - description: "BRIDGE_CLIENTS"
    ipaddr: "10.100.0.1"
    subnet: "24"
    descr: "CLIENTS"
# Bridge0 is NOT in opnsense_zone_bridges because it already exists as the
# LAN interface with its IP (10.0.0.1/24) set by OPNsense initial setup.
# Its membership is managed by the bridge update task — BRIDGE0's keep_members
# (opt4/opt3) are prepended, and dynamic members (opt1/vlan0.1.2) are collected
# from interface_assignments entries with bridge: "BRIDGE0".

# opn_dhcp — Dnsmasq disabled, Kea active. Raw sockets, fw_rules=false.
opnsense_enforce_dnsmasq_disabled: true

# opn_ha — disabled. SYNC zone exists (vlan0.4000.1, 10.40.0.1/24) but no peer.
opnsense_ha_enabled: false
opnsense_carp_vhid_base: 1

# opn_edge_decommission — evidence gate. Blocks withdrawal of bridge0 DHCP
# until active leases = 0. Only runs at network_phase=converged.
opnsense_require_zero_leases: true

# =============================================================================
# Sysctl tunables
# =============================================================================
# forwarding (v4+v6) is OPNsense default=1, not configured.
opnsense_tunables:
  net.inet.carp.senderr_demotion_factor: "240"
  net.inet.carp.log: "2"
  net.link.bridge.pfil_local_phys: "0"
  net.link.bridge.pfil_bridge: "1"
  net.link.bridge.pfil_member: "0"

# =============================================================================
# SSH user for tasks that require filesystem access (home.arpa nodefault)
# =============================================================================
opnsense_dns_ssh_user: "root"

# =============================================================================
# netspec overrides (deep-merged over shared/netspec/zones.yml; set only deviations)
# =============================================================================
netspec_overrides:
  zones:
    transit:
      identifier: "opt5"
    mgmt:
      identifier: "opt16"
    iot:
      identifier: "opt17"
    dmz:
      identifier: "opt18"
    clients:
      identifier: "opt19"
    cluster:
      identifier: "lan"
      dhcp: true
      dhcp_pool: "10.0.0.100 - 10.0.0.200"
    sync:
      identifier: "opt7"

  # Host inventory.
  #
  # Example — multi-homed host (resolves to correct IP per subnet):
  #   - hostname: "gateway"
  #     description: "Edge router"
  #     interfaces:
  #       - ip: "10.10.0.1"
  #         subnet: "10.10.0.0/24"
  #       - ip: "10.100.0.1"
  #         subnet: "10.100.0.0/24"
  #
  # Example — single-homed host with DHCP reservation and static ARP:
  #   - hostname: "server1"
  #     mac: "aa:bb:cc:dd:ee:ff"
  #     static_arp: true
  #     wol: true
  #     description: "Rack server"
  #     interfaces:
  #       - ip: "10.10.0.50"
  #         subnet: "10.10.0.0/24"
  #
  # Example — host with DNS aliases:
  #   - hostname: "switch"
  #     mac: "11:22:33:44:55:66"
  #     description: "Managed switch"
  #     aliases:
  #       - hostname: "model-name"
  #         domain: "vendor.home.arpa"
  #     interfaces:
  #       - ip: "10.0.0.21"
  #         subnet: "10.0.0.0/24"
  #
  # Required fields: hostname, description, interfaces (list of {ip, subnet})
  # Optional fields: mac, static_arp, wol, domain, aliases (list of {hostname, domain})
  hosts:
    # OPNsense gateway — present on every zone subnet
    - hostname: "stargate"
      description: "OPNsense edge router"
      interfaces:
        - ip: "10.0.0.1"
          subnet: "10.0.0.0/24"
        - ip: "10.10.0.1"
          subnet: "10.10.0.0/24"
        - ip: "10.20.0.1"
          subnet: "10.20.0.0/24"
        - ip: "10.30.0.1"
          subnet: "10.30.0.0/24"
        - ip: "10.40.0.1"
          subnet: "10.40.0.0/24"
        - ip: "10.100.0.1"
          subnet: "10.100.0.0/24"
    # PXE/iPXE HTTP boot server — Nginx on port 8080
    # Resolves per-subnet to the local gateway via Unbound views
    - hostname: "boot"
      description: "PXE HTTP boot server"
      interfaces:
        - ip: "10.10.0.1"
          subnet: "10.10.0.0/24"
        - ip: "10.30.0.1"
          subnet: "10.30.0.0/24"
        - ip: "10.100.0.1"
          subnet: "10.100.0.0/24"
    # Switches
    - hostname: "qnap"
      description: "QNAP QSW-M408S managed switch"
      aliases:
        - hostname: "qsw-m408s"
          domain: "qnap.home.arpa"
      interfaces:
        - ip: "10.0.0.21"
          subnet: "10.0.0.0/24"
    - hostname: "netgear"
      mac: "34:98:b5:ac:e3:0c"
      static_arp: true
      description: "NETGEAR GS305EP PoE switch"
      aliases:
        - hostname: "gs305ep"
          domain: "netgear.home.arpa"
      interfaces:
        - ip: "10.0.0.22"
          subnet: "10.0.0.0/24"
    # WiFi access points
    - hostname: "ap"
      mac: "74:83:c2:14:af:99"
      static_arp: true
      description: "UniFi UAP-AC-HD access point"
      aliases:
        - hostname: "uap-ac-hd"
          domain: "unifi.home.arpa"
      interfaces:
        - ip: "10.0.0.23"
          subnet: "10.0.0.0/24"
    - hostname: "orbi"
      mac: "6c:cd:d6:e6:44:62"
      static_arp: true
      description: "NETGEAR Orbi RBR750 legacy WiFi"
      aliases:
        - hostname: "rbr750"
          domain: "orbi.home.arpa"
      interfaces:
        - ip: "10.0.0.24"
          subnet: "10.0.0.0/24"
    # Talos cluster (optiplexprime)
    - hostname: "op1"
      mac: "fc:34:97:1e:79:d4"
      static_arp: true
      wol: true
      description: "Talos op1 10G SFP"
      interfaces:
        - ip: "10.0.0.33"
          subnet: "10.0.0.0/24"
    - hostname: "op2"
      mac: "fc:34:97:1e:79:d1"
      static_arp: true
      wol: true
      description: "Talos op2 10G SFP"
      interfaces:
        - ip: "10.0.0.34"
          subnet: "10.0.0.0/24"
    - hostname: "op3"
      mac: "fc:34:97:1e:79:d2"
      static_arp: true
      wol: true
      description: "Talos op3 10G SFP"
      interfaces:
        - ip: "10.0.0.35"
          subnet: "10.0.0.0/24"
    - hostname: "coredns"
      description: "CoreDNS Cilium L2 VIP"
      interfaces:
        - ip: "10.0.0.51"
          subnet: "10.0.0.0/24"
    # Workstations
    - hostname: "mithril"
      mac: "cc:48:3a:77:f2:20"
      static_arp: true
      wol: true
      description: "mithril wired NIC"
      interfaces:
        - ip: "10.10.0.184"
          subnet: "10.10.0.0/24"
    - hostname: "sting"
      mac: "6c:6a:77:43:d0:a5"
      description: "sting WiFi"
      interfaces:
        - ip: "10.100.0.10"
          subnet: "10.100.0.0/24"
    - hostname: "pocket"
      mac: "22:0e:df:17:a7:fe"
      description: "Pixel pocket"
      interfaces:
        - ip: "10.100.0.11"
          subnet: "10.100.0.0/24"
    - hostname: "leviathan"
      mac: "00:2b:67:1d:f0:29"
      description: "laptop hosting uwuntu VM"
      interfaces:
        - ip: "10.100.0.12"
          subnet: "10.100.0.0/24"
    - hostname: "uwuntu"
      mac: "00:0c:29:6d:91:60"
      description: "VMware uwuntu VM"
      interfaces:
        - ip: "10.100.0.160"
          subnet: "10.100.0.0/24"

# =============================================================================
# User and RBAC management
# =============================================================================
# Groups containing the API user cannot be managed via the API — OPNsense
# blocks self-lockout. The admins group (barbie's group) is managed via
# bootstrap and the web UI only.
opnsense_groups: []

opnsense_users:
  - name: "barbie"
    description: "Admin operator"
    shell: "/bin/csh"
    membership: ["admins"]
    update_password: "on_create"

# =============================================================================
# IDS — Suricata intrusion detection (discovery mode)
# =============================================================================
# =============================================================================
# Caching Proxy (Squid) — transparent HTTP caching
# =============================================================================
# Disabled until os-squid is installed (requires system upgrade first).
# After upgrade: set opnsense_proxy_enabled: true and run --tags proxy.
opnsense_proxy_enabled: true
opnsense_proxy_mode: "transparent"
opnsense_proxy_hostname: "stargate.home.arpa"
opnsense_proxy_email: "admin@home.arpa"
# Transparent proxy on CLIENTS, IOT, DMZ.
# MGMT removed after successful evaluation.
# LAN (cluster) excluded — Talos nodes manage their own HTTP.
opnsense_proxy_interfaces: ["opt19", "opt17", "opt18"]

# 200GB disk cache — aggressive caching for container images, ISOs, packages.
# 3GB max object — container layers, golang/npm/python packages, OS images.
# 1GB RAM cache — keep hot objects in memory for instant re-serve.
# 16MB max RAM object — npm tarballs, small packages stay in RAM.
opnsense_proxy_cache_size_mb: 204800
opnsense_proxy_cache_memory_mb: 8192
opnsense_proxy_cache_max_object_mb: 3072
opnsense_proxy_cache_max_memory_kb: 16384
opnsense_proxy_cache_linux_packages: true
opnsense_proxy_cache_windows_updates: true

# ClamAV + C-ICAP — scan all HTTP downloads for malware.
# max_scan_size and max_file_size must accommodate large cached objects.
opnsense_proxy_icap_enabled: true
opnsense_proxy_clamav_max_scan_size: "3G"
opnsense_proxy_clamav_max_file_size: "3G"
opnsense_proxy_clamav_block_macros: true
opnsense_proxy_clamav_block_encrypted_archives: true

# =============================================================================
# Nginx — HTTP file server for PXE boot, ISOs, and future reverse proxy
# =============================================================================
opnsense_nginx_enabled: true
opnsense_nginx_servers:
  - servername: "boot.home.arpa"
    listen_http: "8080"
    root: "/usr/local/tftp"
    disable_bot_protection: true
    sendfile: true
    locations:
      - description: "PXE boot assets and ISOs"
        urlpattern: "/"
        root: "/usr/local/tftp"
        autoindex: true

# =============================================================================
# PXE / netboot.xyz — network booting on all DHCP-enabled subnets
# =============================================================================
opnsense_pxe_enabled: true
opnsense_pxe_tftp_listen: "0.0.0.0"
opnsense_pxe_assets:
  # --- Ubuntu 24.04.4 LTS (Noble Numbat) ---
  - url: "https://releases.ubuntu.com/24.04.4/ubuntu-24.04.4-desktop-amd64.iso"
    dest: "assets/ubuntu/24.04/desktop/ubuntu-24.04.4-desktop-amd64.iso"
    checksum: "sha256:3a4c9877b483ab46d7c3fbe165a0db275e1ae3cfe56a5657e5a47c2f99a99d1e"
    kernel: "casper/vmlinuz"
    initrd: "casper/initrd"
    boot_args: "root=/dev/ram0 ramdisk_size=3500000 ip=dhcp cloud-config-url=/dev/null"
  - url: "https://releases.ubuntu.com/24.04.4/ubuntu-24.04.4-live-server-amd64.iso"
    dest: "assets/ubuntu/24.04/server/ubuntu-24.04.4-live-server-amd64.iso"
    checksum: "sha256:e907d92eeec9df64163a7e454cbc8d7755e8ddc7ed42f99dbc80c40f1a138433"
    kernel: "casper/vmlinuz"
    initrd: "casper/initrd"
    boot_args: "root=/dev/ram0 ramdisk_size=3500000 ip=dhcp cloud-config-url=/dev/null"
  - url: "https://cdimage.ubuntu.com/lubuntu/releases/24.04.4/release/lubuntu-24.04.4-desktop-amd64.iso"
    dest: "assets/ubuntu/24.04/lubuntu/lubuntu-24.04.4-desktop-amd64.iso"
    checksum: "sha256:5ca3ab769f1538fec7c7d8a5af2e73d3f06ea22f979f6560a9cc4acaf042a5fa"
    kernel: "casper/vmlinuz"
    initrd: "casper/initrd"
    boot_args: "root=/dev/ram0 ramdisk_size=3500000 ip=dhcp cloud-config-url=/dev/null"
  # --- Ubuntu 26.04 LTS (Resolute Raccoon) ---
  - url: "https://releases.ubuntu.com/26.04/ubuntu-26.04-desktop-amd64.iso"
    dest: "assets/ubuntu/26.04/desktop/ubuntu-26.04-desktop-amd64.iso"
